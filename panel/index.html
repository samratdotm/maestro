<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maestro — Agent Board</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 0 0 48px;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: -0.01em;
    }
    header .meta {
      font-size: 0.8rem;
      color: #64748b;
    }
    .pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: blink 2s infinite;
      margin-left: auto;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    .last-refresh {
      font-size: 0.72rem;
      color: #475569;
    }

    main {
      max-width: 1000px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 14px;
    }

    /* ── Job table ── */
    .job-table {
      width: 100%;
      border-collapse: collapse;
    }
    .job-table th {
      text-align: left;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
      padding: 0 16px 10px;
      border-bottom: 1px solid #2d3148;
    }
    .job-table th:first-child { padding-left: 0; }

    .job-row {
      border-bottom: 1px solid #1e2235;
      transition: background 0.2s;
    }
    .job-row:hover { background: #171a26; }
    .job-row td {
      padding: 14px 16px;
      vertical-align: top;
      font-size: 0.85rem;
    }
    .job-row td:first-child { padding-left: 0; }

    /* ── Agent badge ── */
    .agent-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      background: #1e1b4b;
      color: #a5b4fc;
      white-space: nowrap;
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .status-badge.running {
      background: #451a03;
      color: #fdba74;
      border: 1px solid #92400e;
    }
    .status-badge.done {
      background: #052e16;
      color: #4ade80;
      border: 1px solid #14532d;
    }
    .status-badge.blocked {
      background: #450a0a;
      color: #f87171;
      border: 1px solid #7f1d1d;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .running .dot { background: #fb923c; animation: blink 1.2s infinite; }
    .done    .dot { background: #4ade80; }
    .blocked .dot { background: #f87171; }

    /* ── Task text ── */
    .task-text {
      color: #cbd5e1;
      line-height: 1.45;
    }

    /* ── Result cell ── */
    .result-text {
      color: #94a3b8;
      line-height: 1.55;
      font-size: 0.82rem;
      max-width: 340px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .result-placeholder {
      color: #334155;
      font-size: 0.78rem;
      font-style: italic;
    }

    /* ── Trace ── */
    .trace-id {
      font-size: 0.68rem;
      color: #4f46e5;
      margin-top: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-all;
    }

    /* ── Timestamp ── */
    .ts {
      font-size: 0.72rem;
      color: #475569;
      white-space: nowrap;
    }

    /* ── Summary bar ── */
    .summary {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 0.8rem;
    }
    .summary-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
    }
    .summary-item strong { font-weight: 700; }
    .summary-item.run  strong { color: #fdba74; }
    .summary-item.done strong { color: #4ade80; }
    .summary-item.blk  strong { color: #f87171; }

    /* ── Empty / error ── */
    .empty {
      color: #334155;
      font-size: 0.85rem;
      padding: 32px 0;
      text-align: center;
    }
    .error-msg {
      color: #f87171;
      font-size: 0.8rem;
      padding: 10px 14px;
      background: #1e1010;
      border-radius: 6px;
      border: 1px solid #7f1d1d;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Maestro — Agent Board</h1>
    <div class="meta">live · 2 s refresh</div>
  </div>
  <div class="pulse"></div>
  <span class="last-refresh" id="refreshTs">–</span>
</header>

<main>
  <div id="errorBanner"></div>

  <div class="summary" id="summary"></div>

  <div class="section-title">Jobs</div>
  <table class="job-table">
    <thead>
      <tr>
        <th>Agent</th>
        <th>Task</th>
        <th>Status</th>
        <th>Result</th>
        <th>Started</th>
      </tr>
    </thead>
    <tbody id="jobsBody">
      <tr><td colspan="5" class="empty">Waiting for jobs…</td></tr>
    </tbody>
  </table>
</main>

<script>
const CONVEX_URL = 'http://127.0.0.1:3210';
const POLL_MS = 2000;

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmt(ts) {
  const d = new Date(ts);
  const now = Date.now();
  const diff = now - ts;
  if (diff < 60_000) return `${Math.round(diff / 1000)}s ago`;
  if (diff < 3600_000) return `${Math.round(diff / 60_000)}m ago`;
  return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

function renderJob(job) {
  const statusClass = job.status;
  const label = { running: 'running', done: 'done', blocked: 'blocked' }[job.status] ?? job.status;

  const resultHtml = job.result
    ? `<div class="result-text">${esc(job.result)}</div>`
    : `<span class="result-placeholder">${job.status === 'running' ? 'in progress…' : '–'}</span>`;

  const traceHtml = job.trace
    ? `<div class="trace-id">trace: ${esc(job.trace)}</div>`
    : '';

  return `
    <tr class="job-row" data-id="${esc(job._id)}">
      <td><span class="agent-badge">${esc(job.agent)}</span></td>
      <td><span class="task-text">${esc(job.task)}</span></td>
      <td>
        <span class="status-badge ${statusClass}">
          <span class="dot"></span>${label}
        </span>
      </td>
      <td>${resultHtml}${traceHtml}</td>
      <td><span class="ts">${fmt(job.createdAt)}</span></td>
    </tr>`;
}

async function refresh() {
  const errEl = document.getElementById('errorBanner');
  try {
    const res = await fetch(`${CONVEX_URL}/api/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: 'jobs:listJobs', args: {}, format: 'json' }),
    });
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const data = await res.json();

    if (data.status === 'error') throw new Error(data.errorMessage ?? 'Convex error');
    const jobs = data.value ?? [];

    errEl.innerHTML = '';

    // summary counts
    const counts = { running: 0, done: 0, blocked: 0 };
    for (const j of jobs) counts[j.status] = (counts[j.status] ?? 0) + 1;
    document.getElementById('summary').innerHTML = `
      <div class="summary-item run"><span class="dot" style="background:#fb923c;width:8px;height:8px;border-radius:50%;"></span><strong>${counts.running}</strong> running</div>
      <div class="summary-item done"><span class="dot" style="background:#4ade80;width:8px;height:8px;border-radius:50%;"></span><strong>${counts.done}</strong> done</div>
      <div class="summary-item blk"><span class="dot" style="background:#f87171;width:8px;height:8px;border-radius:50%;"></span><strong>${counts.blocked}</strong> blocked</div>
    `;

    const tbody = document.getElementById('jobsBody');
    if (jobs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">No jobs yet — dispatch a command to get started.</td></tr>';
    } else {
      tbody.innerHTML = jobs.map(renderJob).join('');
    }

    document.getElementById('refreshTs').textContent =
      'refreshed ' + new Date().toLocaleTimeString();

  } catch (e) {
    errEl.innerHTML = `<div class="error-msg">⚠ ${esc(e.message)}</div>`;
  }
}

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
