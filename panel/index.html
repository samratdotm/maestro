<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maestro — Agent Board</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0c12;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 0 0 64px;
      font-size: 16px;
    }

    /* ── Header ── */
    header {
      background: #12151f;
      border-bottom: 1px solid #2d3148;
      padding: 24px 48px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-brand h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: #a78bfa;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .header-brand .tagline {
      font-size: 0.95rem;
      color: #64748b;
      margin-top: 3px;
      letter-spacing: 0.01em;
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .live-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #22c55e;
      background: #052e16;
      border: 1px solid #14532d;
      border-radius: 99px;
      padding: 4px 12px;
    }
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: blink 2s infinite;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    .last-refresh {
      font-size: 0.78rem;
      color: #475569;
    }

    main {
      max-width: 1200px;
      margin: 36px auto;
      padding: 0 40px;
    }

    /* ── Error banner ── */
    .error-msg {
      color: #f87171;
      font-size: 0.9rem;
      padding: 12px 16px;
      background: #1e1010;
      border-radius: 8px;
      border: 1px solid #7f1d1d;
      margin-bottom: 24px;
    }

    /* ── Latest dispatch hero ── */
    .dispatch-hero {
      background: #13162a;
      border: 1px solid #312e81;
      border-radius: 14px;
      padding: 22px 28px;
      margin-bottom: 36px;
    }
    .dispatch-hero-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6366f1;
      margin-bottom: 10px;
    }
    .dispatch-command {
      font-size: 1.25rem;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.4;
    }
    .dispatch-meta {
      margin-top: 10px;
      display: flex;
      gap: 20px;
      font-size: 0.82rem;
      color: #64748b;
    }
    .dispatch-meta strong {
      font-weight: 700;
    }
    .dispatch-meta .run-count  strong { color: #fdba74; }
    .dispatch-meta .done-count strong { color: #4ade80; }
    .dispatch-meta .blk-count  strong { color: #f87171; }
    .dispatch-hero.empty {
      border-color: #1e293b;
      background: #0f1117;
    }
    .dispatch-hero.empty .dispatch-command {
      color: #334155;
      font-style: italic;
      font-size: 1rem;
      font-weight: 400;
    }

    /* ── Section label ── */
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 16px;
    }

    /* ── Job table ── */
    .job-table {
      width: 100%;
      border-collapse: collapse;
    }
    .job-table th {
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
      padding: 0 20px 12px;
      border-bottom: 1px solid #2d3148;
    }
    .job-table th:first-child { padding-left: 0; }

    .job-row {
      border-bottom: 1px solid #1a1d2e;
      transition: background 0.3s;
    }
    .job-row:hover { background: #13162a; }
    .job-row td {
      padding: 18px 20px;
      vertical-align: middle;
      font-size: 1rem;
    }
    .job-row td:first-child { padding-left: 0; }

    /* Flash when a row flips running→done */
    @keyframes flash-done {
      0%   { background: #052e16; }
      30%  { background: #166534; }
      100% { background: transparent; }
    }
    .job-row.just-done {
      animation: flash-done 1.8s ease-out forwards;
    }

    /* ── Agent badge ── */
    .agent-badge {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 6px;
      background: #1e1b4b;
      color: #a5b4fc;
      white-space: nowrap;
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .status-badge.running {
      background: #451a03;
      color: #fdba74;
      border: 1px solid #92400e;
    }
    .status-badge.done {
      background: #052e16;
      color: #4ade80;
      border: 1px solid #14532d;
    }
    .status-badge.blocked {
      background: #450a0a;
      color: #f87171;
      border: 1px solid #7f1d1d;
    }
    .sdot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .running .sdot { background: #fb923c; animation: blink 1.2s infinite; }
    .done    .sdot { background: #4ade80; }
    .blocked .sdot { background: #f87171; }

    /* ── Task text ── */
    .task-text {
      color: #cbd5e1;
      line-height: 1.5;
      font-size: 1rem;
    }

    /* ── Result cell ── */
    .result-text {
      color: #94a3b8;
      line-height: 1.6;
      font-size: 0.92rem;
      max-width: 380px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .result-placeholder {
      color: #334155;
      font-size: 0.9rem;
      font-style: italic;
    }

    /* ── Respan badge ── */
    .respan-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #818cf8;
      background: #1e1b4b;
      border: 1px solid #3730a3;
      border-radius: 6px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    /* ── Timestamp ── */
    .ts {
      font-size: 0.85rem;
      color: #475569;
      white-space: nowrap;
    }

    /* ── Empty ── */
    .empty-row td {
      color: #334155;
      font-size: 0.95rem;
      padding: 48px 0;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <h1>Maestro</h1>
    <div class="tagline">Conduct your AI coding agents by voice.</div>
  </div>
  <div class="header-right">
    <div class="live-pill">
      <span class="pulse-dot"></span>LIVE
    </div>
    <span class="last-refresh" id="refreshTs">–</span>
  </div>
</header>

<main>
  <div id="errorBanner"></div>

  <!-- Latest dispatch hero -->
  <div class="dispatch-hero empty" id="dispatchHero">
    <div class="dispatch-hero-label">Latest Dispatch</div>
    <div class="dispatch-command" id="dispatchCommand">Waiting for a voice command…</div>
    <div class="dispatch-meta" id="dispatchMeta"></div>
  </div>

  <div class="section-title">All Jobs</div>
  <table class="job-table">
    <thead>
      <tr>
        <th>Agent</th>
        <th>Task</th>
        <th>Status</th>
        <th>Result</th>
        <th>Started</th>
      </tr>
    </thead>
    <tbody id="jobsBody">
      <tr class="empty-row"><td colspan="5">Waiting for jobs…</td></tr>
    </tbody>
  </table>
</main>

<script>
const CONVEX_URL = 'http://127.0.0.1:3210';
const POLL_MS = 2000;
const BATCH_WINDOW_MS = 5000;   // jobs within 5s of the newest = same dispatch
const FLASH_DURATION_MS = 3000; // how long the just-done flash lasts

// id → last-seen status, for detecting running→done flips
const prevStatus = {};
// id → timestamp of flip to done, for driving flash CSS
const flipTs = {};

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmt(ts) {
  const diff = Date.now() - ts;
  if (diff < 60_000)   return `${Math.round(diff / 1000)}s ago`;
  if (diff < 3600_000) return `${Math.round(diff / 60_000)}m ago`;
  return new Date(ts).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

function detectFlips(jobs) {
  for (const j of jobs) {
    const prev = prevStatus[j._id];
    if (prev === 'running' && j.status === 'done') {
      flipTs[j._id] = Date.now();
    }
    prevStatus[j._id] = j.status;
  }
}

function renderJob(job) {
  const isFlashing = flipTs[job._id] && (Date.now() - flipTs[job._id] < FLASH_DURATION_MS);
  const flashClass = isFlashing ? ' just-done' : '';

  const resultHtml = job.result
    ? `<div class="result-text">${esc(job.result)}</div>`
    : `<span class="result-placeholder">${job.status === 'running' ? 'in progress…' : '–'}</span>`;

  const respan = job.trace
    ? `<div><span class="respan-badge">🔍 Respan-traced</span></div>`
    : '';

  const label = { running: 'running', done: 'done ✓', blocked: 'blocked' }[job.status] ?? job.status;

  return `
    <tr class="job-row${flashClass}" data-id="${esc(job._id)}">
      <td><span class="agent-badge">${esc(job.agent)}</span></td>
      <td><span class="task-text">${esc(job.task)}</span></td>
      <td>
        <span class="status-badge ${esc(job.status)}">
          <span class="sdot"></span>${label}
        </span>
      </td>
      <td>${resultHtml}${respan}</td>
      <td><span class="ts">${fmt(job.createdAt)}</span></td>
    </tr>`;
}

function updateHero(jobs) {
  const hero = document.getElementById('dispatchHero');
  const cmdEl = document.getElementById('dispatchCommand');
  const metaEl = document.getElementById('dispatchMeta');

  if (jobs.length === 0) {
    hero.classList.add('empty');
    cmdEl.textContent = 'Waiting for a voice command…';
    metaEl.innerHTML = '';
    return;
  }

  // Most recent batch: jobs within BATCH_WINDOW_MS of the newest createdAt
  const newest = jobs[0].createdAt; // listJobs returns desc
  const batch = jobs.filter(j => newest - j.createdAt <= BATCH_WINDOW_MS);
  const counts = { running: 0, done: 0, blocked: 0 };
  for (const j of batch) counts[j.status] = (counts[j.status] ?? 0) + 1;
  const total = batch.length;

  hero.classList.remove('empty');

  // Summarize the batch tasks as a command-like string
  const taskList = batch.map(j => j.task).join(' · ');
  cmdEl.textContent = taskList;

  metaEl.innerHTML = `
    <span>${total} agent${total !== 1 ? 's' : ''} dispatched · ${fmt(newest)}</span>
    <span class="run-count"><strong>${counts.running}</strong> running</span>
    <span class="done-count"><strong>${counts.done}</strong> done</span>
    ${counts.blocked ? `<span class="blk-count"><strong>${counts.blocked}</strong> blocked</span>` : ''}
  `;
}

async function refresh() {
  const errEl = document.getElementById('errorBanner');
  try {
    const res = await fetch(`${CONVEX_URL}/api/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: 'jobs:listJobs', args: {}, format: 'json' }),
    });
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const data = await res.json();
    if (data.status === 'error') throw new Error(data.errorMessage ?? 'Convex error');
    const jobs = data.value ?? [];

    errEl.innerHTML = '';

    detectFlips(jobs);
    updateHero(jobs);

    const tbody = document.getElementById('jobsBody');
    if (jobs.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No jobs yet — dispatch a command to get started.</td></tr>';
    } else {
      tbody.innerHTML = jobs.map(renderJob).join('');
    }

    document.getElementById('refreshTs').textContent =
      'refreshed ' + new Date().toLocaleTimeString();

  } catch (e) {
    errEl.innerHTML = `<div class="error-msg">⚠ ${esc(e.message)}</div>`;
  }
}

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
